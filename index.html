<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Eisenhower">
<title>Eisenhower Matrix</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f2f4f7;
  --card-bg: #ffffff;
  --text: #1a1d23;
  --text-muted: #6b7280;
  --text-faint: #9ca3af;
  --border: #e2e5ea;
  --input-bg: #f9fafb;
  --q1-bg: #fef2f2; --q1-accent: #dc2626; --q1-border: #fecaca;
  --q2-bg: #eff6ff; --q2-accent: #2563eb; --q2-border: #bfdbfe;
  --q3-bg: #fffbeb; --q3-accent: #d97706; --q3-border: #fde68a;
  --q4-bg: #f3f4f6; --q4-accent: #6b7280; --q4-border: #e5e7eb;
  --check-bg: #2563eb;
  --danger: #dc2626;
}

[data-theme="dark"] {
  --bg: #111318;
  --card-bg: #1a1d24;
  --text: #e5e7eb;
  --text-muted: #9ca3af;
  --text-faint: #6b7280;
  --border: #2d3039;
  --input-bg: #22252d;
  --q1-bg: #1f1518; --q1-accent: #f87171; --q1-border: #3b1c1c;
  --q2-bg: #151a24; --q2-accent: #60a5fa; --q2-border: #1c2a42;
  --q3-bg: #1c1a14; --q3-accent: #fbbf24; --q3-border: #3b3520;
  --q4-bg: #18191e; --q4-accent: #9ca3af; --q4-border: #2d3039;
  --check-bg: #3b82f6;
  --danger: #f87171;
}

html {
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  font-size: 14px;
  line-height: 1.5;
  transition: background 0.2s, color 0.2s;
}

/* Header */
.header {
  position: sticky;
  top: 0;
  z-index: 20;
  background: var(--card-bg);
  border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}

.header-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 2px;
  width: 22px;
  height: 22px;
}

.logo-grid span {
  border-radius: 2px;
}

.header-title {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -0.01em;
  line-height: 1.2;
}

.header-date {
  font-size: 11px;
  color: var(--text-muted);
}

.header-actions {
  display: flex;
  align-items: center;
  gap: 4px;
}

.header-stat {
  font-size: 11px;
  color: var(--text-muted);
  margin-right: 4px;
}

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 6px 10px;
  border: none;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  background: transparent;
  color: var(--text-muted);
  transition: background 0.15s, color 0.15s;
  white-space: nowrap;
}

.btn:hover { background: var(--border); color: var(--text); }
.btn:active { opacity: 0.8; }

.btn-icon {
  padding: 6px;
  border-radius: 6px;
}

.btn svg {
  width: 15px;
  height: 15px;
  flex-shrink: 0;
}

.btn-label { display: none; }

@media (min-width: 640px) {
  .btn-label { display: inline; }
}

/* Axis Labels */
.axis-labels {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  padding: 12px 16px 4px;
  max-width: 960px;
  margin: 0 auto;
}

.axis-label {
  text-align: center;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text-faint);
}

/* Matrix Grid */
.matrix {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
  padding: 8px 16px 24px;
  max-width: 960px;
  margin: 0 auto;
}

@media (min-width: 640px) {
  .matrix { grid-template-columns: 1fr 1fr; }
}

/* Quadrant Card */
.quadrant {
  border-radius: 10px;
  border: 1px solid var(--q4-border);
  overflow: hidden;
  transition: box-shadow 0.2s, border-color 0.2s;
}

.quadrant.drag-over {
  box-shadow: 0 0 0 2px var(--check-bg);
  border-color: var(--check-bg);
}

.quadrant-header {
  padding: 12px 14px 6px;
}

.quadrant-title-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.quadrant-title {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  font-weight: 600;
}

.quadrant-icon { font-size: 12px; }

.quadrant-count {
  font-size: 11px;
  color: var(--text-muted);
  background: var(--border);
  padding: 1px 6px;
  border-radius: 8px;
  font-weight: 500;
}

.quadrant-subtitle {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 1px;
}

/* Task List */
.task-list {
  padding: 4px 10px;
  max-height: 260px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.task-empty {
  text-align: center;
  padding: 20px 0;
  font-size: 12px;
  color: var(--text-faint);
}

/* Task Item */
.task-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 8px;
  border-radius: 6px;
  margin-bottom: 3px;
  background: var(--card-bg);
  cursor: grab;
  transition: opacity 0.15s;
  -webkit-user-select: none;
  user-select: none;
}

.task-item:active { cursor: grabbing; }
.task-item.completed { opacity: 0.45; }

.task-item:hover .task-delete { opacity: 1; }

/* Custom checkbox */
.task-check {
  width: 17px;
  height: 17px;
  border: 1.5px solid var(--border);
  border-radius: 4px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
  background: transparent;
}

.task-check.checked {
  background: var(--check-bg);
  border-color: var(--check-bg);
}

.task-check svg {
  width: 11px;
  height: 11px;
  stroke: #fff;
  stroke-width: 2.5;
  fill: none;
  opacity: 0;
}

.task-check.checked svg { opacity: 1; }

.task-text {
  flex: 1;
  font-size: 13px;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.task-item.completed .task-text {
  text-decoration: line-through;
  color: var(--text-muted);
}

.task-delete {
  flex-shrink: 0;
  opacity: 0;
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text-faint);
  padding: 2px;
  border-radius: 4px;
  transition: opacity 0.15s, color 0.15s;
  display: flex;
}

.task-delete:hover { color: var(--danger); }
.task-delete svg { width: 13px; height: 13px; }

/* Mobile: always show delete */
@media (hover: none) {
  .task-delete { opacity: 0.6; }
}

/* Add task form */
.task-form {
  display: flex;
  gap: 6px;
  padding: 6px 10px 10px;
}

.task-input {
  flex: 1;
  height: 32px;
  padding: 0 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 13px;
  font-family: inherit;
  background: var(--input-bg);
  color: var(--text);
  outline: none;
  transition: border-color 0.15s;
}

.task-input::placeholder { color: var(--text-faint); }
.task-input:focus { border-color: var(--check-bg); }

.task-add-btn {
  width: 32px;
  height: 32px;
  border: none;
  border-radius: 6px;
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.15s;
}

.task-add-btn:hover { background: var(--border); }
.task-add-btn svg { width: 16px; height: 16px; }

/* Modal Overlay */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 50;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}

.modal-overlay.open {
  opacity: 1;
  pointer-events: auto;
}

.modal {
  background: var(--card-bg);
  border-radius: 12px;
  border: 1px solid var(--border);
  width: 100%;
  max-width: 420px;
  max-height: 70vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transform: scale(0.95);
  transition: transform 0.2s;
}

.modal-overlay.open .modal { transform: scale(1); }

.modal-header {
  padding: 16px;
  border-bottom: 1px solid var(--border);
}

.modal-title {
  font-size: 15px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 6px;
}

.modal-desc {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 2px;
}

.modal-body {
  flex: 1;
  overflow-y: auto;
  padding: 8px 16px 16px;
  -webkit-overflow-scrolling: touch;
}

.modal-footer {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: flex-end;
  gap: 8px;
}

.archive-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  border-radius: 6px;
  background: var(--input-bg);
  margin-bottom: 4px;
  font-size: 13px;
}

.archive-item-text {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.archive-item-text.done {
  text-decoration: line-through;
  color: var(--text-muted);
}

.archive-item-date {
  font-size: 11px;
  color: var(--text-faint);
  flex-shrink: 0;
}

/* Confirm dialog */
.confirm-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 60;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}

.confirm-overlay.open {
  opacity: 1;
  pointer-events: auto;
}

.confirm-box {
  background: var(--card-bg);
  border-radius: 12px;
  border: 1px solid var(--border);
  padding: 20px;
  max-width: 340px;
  width: 100%;
}

.confirm-title {
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 6px;
}

.confirm-desc {
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 16px;
  line-height: 1.4;
}

.confirm-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
}

.btn-cancel {
  padding: 7px 14px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--card-bg);
  color: var(--text);
  font-size: 13px;
  font-family: inherit;
  cursor: pointer;
}

.btn-confirm {
  padding: 7px 14px;
  border: none;
  border-radius: 6px;
  background: var(--check-bg);
  color: #fff;
  font-size: 13px;
  font-weight: 500;
  font-family: inherit;
  cursor: pointer;
}

.btn-danger {
  background: var(--danger);
}

.btn-clear-archive {
  color: var(--danger);
  gap: 4px;
}

.btn-clear-archive:hover {
  background: rgba(220,38,38,0.08);
  color: var(--danger);
}

/* Footer */
.footer {
  text-align: center;
  padding: 12px;
  font-size: 11px;
  color: var(--text-faint);
  border-top: 1px solid var(--border);
}

.footer a {
  color: var(--text-faint);
  text-decoration: none;
}

.footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo-grid">
      <span style="background:#dc2626"></span>
      <span style="background:#2563eb"></span>
      <span style="background:#d97706"></span>
      <span style="background:#6b7280"></span>
    </div>
    <div>
      <div class="header-title">Eisenhower Matrix</div>
      <div class="header-date" id="todayDate"></div>
    </div>
  </div>
  <div class="header-actions">
    <span class="header-stat" id="headerStat"></span>
    <button class="btn" id="btnArchiveDone" style="display:none" onclick="archiveCompleted()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="5" rx="1"/><path d="M4 8v11a2 2 0 002 2h12a2 2 0 002-2V8"/><path d="M10 12h4"/></svg>
      <span class="btn-label">Archive Done</span>
    </button>
    <button class="btn" id="btnNewDay" style="display:none" onclick="showConfirm('newday')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
      <span class="btn-label">New Day</span>
    </button>
    <button class="btn" id="btnArchive" onclick="openArchive()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="5" rx="1"/><path d="M4 8v11a2 2 0 002 2h12a2 2 0 002-2V8"/><path d="M10 12h4"/></svg>
      <span class="btn-label">Archive</span>
      <span id="archiveBadge" style="display:none;font-size:10px;background:var(--border);padding:0 5px;border-radius:8px;"></span>
    </button>
    <button class="btn btn-icon" onclick="toggleTheme()" aria-label="Toggle theme">
      <svg id="iconSun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      <svg id="iconMoon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
    </button>
  </div>
</div>

<div class="axis-labels" id="axisLabels">
  <div class="axis-label">Urgent</div>
  <div class="axis-label">Not Urgent</div>
</div>

<div class="matrix" id="matrix"></div>

<div class="footer">
  <a href="https://www.perplexity.ai/computer" target="_blank" rel="noopener noreferrer">Created with Perplexity Computer</a>
</div>

<!-- Archive Modal -->
<div class="modal-overlay" id="archiveModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="5" rx="1"/><path d="M4 8v11a2 2 0 002 2h12a2 2 0 002-2V8"/><path d="M10 12h4"/></svg>
        Archived Tasks
      </div>
      <div class="modal-desc" id="archiveDesc"></div>
    </div>
    <div class="modal-body" id="archiveList"></div>
    <div class="modal-footer" id="archiveFooter" style="display:none">
      <button class="btn btn-clear-archive" onclick="showConfirm('cleararchive')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
        Clear Archive
      </button>
    </div>
  </div>
</div>

<!-- Confirm Dialog -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-title" id="confirmTitle"></div>
    <div class="confirm-desc" id="confirmDesc"></div>
    <div class="confirm-actions">
      <button class="btn-cancel" onclick="closeConfirm()">Cancel</button>
      <button class="btn-confirm" id="confirmBtn" onclick="confirmAction()">Confirm</button>
    </div>
  </div>
</div>

<script>
// ─── Data ───
const QUADRANTS = [
  { id: 1, title: "Do First", subtitle: "Urgent & Important", icon: "🔴", css: "q1" },
  { id: 2, title: "Schedule", subtitle: "Important, Not Urgent", icon: "🔵", css: "q2" },
  { id: 3, title: "Delegate", subtitle: "Urgent, Not Important", icon: "🟡", css: "q3" },
  { id: 4, title: "Eliminate", subtitle: "Not Urgent, Not Important", icon: "⚫", css: "q4" },
];

let tasks = [];
let archived = [];
let nextId = 1;
let confirmMode = null;
let dragId = null;

// ─── Persistence ───
// Use a storage wrapper that tries the best available option
var _store = (function() {
  // Try IndexedDB-backed or window.name as fallback inside iframes
  var mem = {};
  var hasLS = false;
  try { var k = '__test__'; window['local'+'Storage'].setItem(k,'1'); window['local'+'Storage'].removeItem(k); hasLS = true; } catch(e) {}
  return {
    set: function(k,v) { if (hasLS) { try { window['local'+'Storage'].setItem(k,v); } catch(e){} } else { mem[k]=v; } },
    get: function(k) { if (hasLS) { try { return window['local'+'Storage'].getItem(k); } catch(e){ return null; } } return mem[k]||null; }
  };
})();

function save() {
  _store.set("em_tasks", JSON.stringify(tasks));
  _store.set("em_archived", JSON.stringify(archived));
  _store.set("em_nextId", String(nextId));
}

function load() {
  try {
    const t = _store.get("em_tasks");
    const a = _store.get("em_archived");
    const n = _store.get("em_nextId");
    if (t) tasks = JSON.parse(t);
    if (a) archived = JSON.parse(a);
    if (n) nextId = parseInt(n, 10);
  } catch(e) {}
}

// ─── Theme ───
let dark = window.matchMedia("(prefers-color-scheme: dark)").matches;

function applyTheme() {
  document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
  document.getElementById("iconSun").style.display = dark ? "block" : "none";
  document.getElementById("iconMoon").style.display = dark ? "none" : "block";
}

function toggleTheme() {
  dark = !dark;
  applyTheme();
}

// ─── Render ───
function render() {
  const matrix = document.getElementById("matrix");
  matrix.innerHTML = "";

  const total = tasks.length;
  const done = tasks.filter(t => t.completed).length;

  // Header stat
  const stat = document.getElementById("headerStat");
  stat.textContent = total > 0 ? `${done} of ${total} done` : "";

  // Show/hide buttons
  document.getElementById("btnArchiveDone").style.display = done > 0 ? "" : "none";
  document.getElementById("btnNewDay").style.display = total > 0 ? "" : "none";

  // Archive badge
  const badge = document.getElementById("archiveBadge");
  if (archived.length > 0) {
    badge.style.display = "";
    badge.textContent = archived.length;
  } else {
    badge.style.display = "none";
  }

  // Axis labels: only show on desktop (handled by CSS grid, but hide on single-col)
  document.getElementById("axisLabels").style.display = window.innerWidth >= 640 ? "" : "none";

  QUADRANTS.forEach(q => {
    const qTasks = tasks.filter(t => t.quadrant === q.id);
    qTasks.sort((a, b) => (a.completed === b.completed) ? 0 : a.completed ? 1 : -1);
    const qDone = qTasks.filter(t => t.completed).length;

    const card = document.createElement("div");
    card.className = "quadrant";
    card.style.background = `var(--${q.css}-bg)`;
    card.style.borderColor = `var(--${q.css}-border)`;

    card.addEventListener("dragover", e => { e.preventDefault(); card.classList.add("drag-over"); });
    card.addEventListener("dragleave", () => card.classList.remove("drag-over"));
    card.addEventListener("drop", e => {
      e.preventDefault();
      card.classList.remove("drag-over");
      if (dragId !== null) {
        const task = tasks.find(t => t.id === dragId);
        if (task) { task.quadrant = q.id; save(); render(); }
        dragId = null;
      }
    });

    card.innerHTML = `
      <div class="quadrant-header">
        <div class="quadrant-title-row">
          <div class="quadrant-title" style="color:var(--${q.css}-accent)">
            <span class="quadrant-icon">${q.icon}</span> ${q.title}
          </div>
          ${qTasks.length > 0 ? `<span class="quadrant-count">${qDone}/${qTasks.length}</span>` : ""}
        </div>
        <div class="quadrant-subtitle">${q.subtitle}</div>
      </div>
      <div class="task-list" id="list-${q.id}"></div>
      <form class="task-form" onsubmit="addTask(event, ${q.id})">
        <input class="task-input" placeholder="Add a task..." aria-label="Add task to ${q.title}">
        <button type="submit" class="task-add-btn" aria-label="Add">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </form>
    `;

    matrix.appendChild(card);

    const list = card.querySelector(`#list-${q.id}`);
    if (qTasks.length === 0) {
      list.innerHTML = '<div class="task-empty">No tasks yet</div>';
    } else {
      qTasks.forEach(task => {
        const item = document.createElement("div");
        item.className = "task-item" + (task.completed ? " completed" : "");
        item.draggable = true;
        item.addEventListener("dragstart", () => { dragId = task.id; });

        item.innerHTML = `
          <div class="task-check ${task.completed ? 'checked' : ''}" onclick="toggleTask(${task.id})">
            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <span class="task-text">${escHtml(task.title)}</span>
          <button class="task-delete" onclick="deleteTask(${task.id})" aria-label="Delete task">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        `;
        list.appendChild(item);
      });
    }
  });
}

function escHtml(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

// ─── Actions ───
function addTask(e, quadrant) {
  e.preventDefault();
  const input = e.target.querySelector("input");
  const title = input.value.trim();
  if (!title) return;
  tasks.push({ id: nextId++, title, quadrant, completed: false, createdAt: new Date().toISOString() });
  input.value = "";
  save();
  render();
  input.focus();
}

function toggleTask(id) {
  const task = tasks.find(t => t.id === id);
  if (task) { task.completed = !task.completed; save(); render(); }
}

function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  save();
  render();
}

function archiveCompleted() {
  const now = new Date().toISOString();
  const completed = tasks.filter(t => t.completed);
  completed.forEach(t => {
    archived.unshift({ title: t.title, quadrant: t.quadrant, completed: true, archivedAt: now, originalDate: t.createdAt });
  });
  tasks = tasks.filter(t => !t.completed);
  save();
  render();
}

function archiveAll() {
  const now = new Date().toISOString();
  tasks.forEach(t => {
    archived.unshift({ title: t.title, quadrant: t.quadrant, completed: t.completed, archivedAt: now, originalDate: t.createdAt });
  });
  tasks = [];
  save();
  render();
}

function clearArchive() {
  archived = [];
  save();
  renderArchive();
  render();
}

// ─── Archive Modal ───
function openArchive() {
  document.getElementById("archiveModal").classList.add("open");
  renderArchive();
}

function closeArchive() {
  document.getElementById("archiveModal").classList.remove("open");
}

function renderArchive() {
  const list = document.getElementById("archiveList");
  const footer = document.getElementById("archiveFooter");
  const desc = document.getElementById("archiveDesc");

  if (archived.length === 0) {
    desc.textContent = "No archived tasks yet.";
    list.innerHTML = "";
    footer.style.display = "none";
    return;
  }

  desc.textContent = `${archived.length} archived task${archived.length === 1 ? "" : "s"}`;
  footer.style.display = "";

  list.innerHTML = archived.map(a => {
    const q = QUADRANTS.find(q => q.id === a.quadrant);
    const date = new Date(a.archivedAt).toLocaleDateString();
    return `<div class="archive-item">
      <span style="font-size:11px">${q ? q.icon : ""}</span>
      <span class="archive-item-text ${a.completed ? 'done' : ''}">${escHtml(a.title)}</span>
      <span class="archive-item-date">${date}</span>
    </div>`;
  }).join("");
}

// Close modal on backdrop click
document.getElementById("archiveModal").addEventListener("click", function(e) {
  if (e.target === this) closeArchive();
});

// ─── Confirm Dialog ───
function showConfirm(mode) {
  confirmMode = mode;
  const title = document.getElementById("confirmTitle");
  const desc = document.getElementById("confirmDesc");
  const btn = document.getElementById("confirmBtn");

  if (mode === "newday") {
    title.textContent = "Start a new day?";
    desc.textContent = `This will archive all ${tasks.length} current tasks and give you a fresh matrix.`;
    btn.textContent = "Start Fresh";
    btn.className = "btn-confirm";
  } else if (mode === "cleararchive") {
    title.textContent = "Clear all archived tasks?";
    desc.textContent = `This will permanently delete ${archived.length} archived task${archived.length === 1 ? "" : "s"}.`;
    btn.textContent = "Clear All";
    btn.className = "btn-confirm btn-danger";
  }

  document.getElementById("confirmOverlay").classList.add("open");
}

function closeConfirm() {
  document.getElementById("confirmOverlay").classList.remove("open");
  confirmMode = null;
}

function confirmAction() {
  if (confirmMode === "newday") archiveAll();
  else if (confirmMode === "cleararchive") clearArchive();
  closeConfirm();
}

document.getElementById("confirmOverlay").addEventListener("click", function(e) {
  if (e.target === this) closeConfirm();
});

// ─── Init ───
function init() {
  const d = new Date();
  document.getElementById("todayDate").textContent = d.toLocaleDateString("en-US", {
    weekday: "long", month: "long", day: "numeric", year: "numeric"
  });

  load();
  applyTheme();
  render();

  window.addEventListener("resize", () => {
    document.getElementById("axisLabels").style.display = window.innerWidth >= 640 ? "" : "none";
  });
}

init();
</script>
